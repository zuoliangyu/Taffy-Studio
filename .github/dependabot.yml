version: 2
# Dependabot opens PRs to keep dependencies current. Tuned here for LOW NOISE:
#   • monthly cadence (not weekly)
#   • minor/patch only — major bumps are usually breaking, so we pull those in by
#     hand rather than letting a bot open a failing PR for each one
#   • grouped, so related updates arrive as a single PR instead of many
updates:
  # --- JS / npm ---
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      tauri:
        patterns:
          - "@tauri-apps/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      markdown:
        patterns:
          - "react-markdown"
          - "remark-*"
          - "rehype-*"
          - "react-syntax-highlighter"
          - "@types/react-syntax-highlighter"
          - "katex"
          - "@types/katex"
          - "mermaid"
      misc:
        patterns:
          - "*"

  # --- Rust / cargo (Tauri shell deps) ---
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      tauri-plugins:
        patterns:
          - "tauri*"
          - "tauri-plugin-*"
      misc:
        patterns:
          - "*"

  # --- GitHub Actions themselves ---
  # Major bumps ARE wanted here (Node runtime / security), but grouped into one PR.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions:
        patterns:
          - "*"
