name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report! Fill in what you can — more detail = faster fix.
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: e.g. 0.1.0 (or a commit SHA if building from source)
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform / target
      multiple: true
      options:
        - Windows (desktop)
        - macOS (desktop)
        - Linux (desktop)
        - iOS
        - Android
        - Web (self-hosted binary)
        - Docker
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS version
      placeholder: e.g. Windows 11 23H2 / macOS 14.5 / Ubuntu 22.04
  - type: input
    id: provider
    attributes:
      label: LLM provider (if relevant)
      placeholder: e.g. OpenAI / Anthropic / Gemini / Ollama / DeepSeek
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs. actual behaviour
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: "Console output, error messages, screenshots. ⚠️ Redact API keys!"
      render: shell
