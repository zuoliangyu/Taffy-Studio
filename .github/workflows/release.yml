name: Release

# Trigger on annotated tags shaped like v0.1.0 / v1.2.3-rc.1.
# Also runnable manually for dry-runs (skips the GH Release upload step).
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release
  packages: write # push the web image to GHCR

jobs:
  # ---- Desktop matrix: Windows / macOS / Linux ------------------------
  desktop:
    name: Desktop (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            rust-targets: x86_64-unknown-linux-gnu
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          # One universal macOS build (Intel + Apple Silicon in one .app/.dmg) —
          # no separate per-arch jobs. Built on the arm64 runner with both targets.
          - os: macos-14
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            target: universal-apple-darwin
            bundles: app,dmg
          - os: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            patchelf

      # No `version:` — reads packageManager (pnpm@10.20.0) from package.json.
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: ${{ matrix.target }}

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build (frontend + tauri bundle)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles ${{ matrix.bundles }} --target ${{ matrix.target }}

      - name: Collect artifacts
        # The Cargo workspace builds into the workspace-root ./target (not
        # src-tauri/target). Flatten Tauri's per-bundle outputs + .sig sidecars.
        shell: bash
        run: |
          mkdir -p staged
          src="target/${{ matrix.target }}/release/bundle"
          find "$src" -type f \( \
            -name '*.deb' -o -name '*.AppImage' -o -name '*.AppImage.tar.gz' -o -name '*.rpm' \
            -o -name '*.dmg' -o -name '*.app.tar.gz' \
            -o -name '*.msi' -o -name '*.exe' -o -name '*.nsis.zip' \
            -o -name '*.sig' \
          \) -exec cp -v {} staged/ \;
          # Windows portable: also ship the raw self-contained exe (no installer;
          # uses system WebView2). It lives one level up from bundle/.
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            rel="target/${{ matrix.target }}/release"
            ver=$(node -p "require('./src-tauri/tauri.conf.json').version")
            prod=$(node -p "require('./src-tauri/tauri.conf.json').productName")
            for cand in "$prod.exe" "taffy-studio.exe"; do
              if [ -f "$rel/$cand" ]; then
                cp -v "$rel/$cand" "staged/$(echo "$prod" | tr ' ' '-')_${ver}_x64-portable.exe"
                break
              fi
            done
          fi
          ls -lah staged

      - uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.os }}
          path: staged/
          if-no-files-found: error

  # ---- Web server: standalone single-binary per OS -------------------
  web:
    name: Web server (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-x86_64
            targets: x86_64-unknown-linux-musl   # fully static — runs on any distro, no libc deps
            ext: ''
          # One universal macOS binary (Intel + Apple Silicon lipo'd together) —
          # built on the arm64 runner with both targets, mirroring the desktop
          # universal-apple-darwin job. No Intel runner (macos-13 is retiring and
          # queues for hours, which used to stall the whole release).
          - os: macos-14
            label: macos-universal
            targets: aarch64-apple-darwin,x86_64-apple-darwin
            ext: ''
          - os: windows-latest
            label: windows-x86_64
            targets: x86_64-pc-windows-msvc
            ext: '.exe'
    steps:
      - uses: actions/checkout@v6

      # taffy-web has no Tauri/system deps — just node + rust.
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      # Linux ships a fully static musl binary (rustls + bundled SQLite, so no
      # OpenSSL/glibc to link). musl-tools provides the musl C toolchain.
      - name: Install musl tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: web-${{ matrix.label }}

      - name: Build frontend (web bundle) + taffy-web
        shell: bash
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          IFS=',' read -ra TARGETS <<< "${{ matrix.targets }}"
          for t in "${TARGETS[@]}"; do
            cargo build -p taffy-web --release --target "$t"
          done

      - name: Package binary
        shell: bash
        run: |
          mkdir -p staged out
          IFS=',' read -ra TARGETS <<< "${{ matrix.targets }}"
          if [ "${{ matrix.label }}" = "macos-universal" ]; then
            # Fuse the per-arch binaries into one fat Mach-O.
            lipo -create \
              "target/aarch64-apple-darwin/release/taffy-web" \
              "target/x86_64-apple-darwin/release/taffy-web" \
              -output out/taffy-web
            tar -czf "staged/taffy-web-${{ matrix.label }}.tar.gz" -C out taffy-web
          elif [ -n "${{ matrix.ext }}" ]; then
            cp "target/${TARGETS[0]}/release/taffy-web.exe" "staged/taffy-web-${{ matrix.label }}.exe"
          else
            tar -czf "staged/taffy-web-${{ matrix.label }}.tar.gz" -C "target/${TARGETS[0]}/release" taffy-web
          fi
          ls -lah staged

      - uses: actions/upload-artifact@v7
        with:
          name: web-${{ matrix.label }}
          path: staged/
          if-no-files-found: error

  # ---- Web image: build + push to GHCR -------------------------------
  docker:
    name: Web image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/taffy-web
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build + push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/web.Dockerfile
          # Push only on real tag releases; workflow_dispatch is a dry-run build.
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Android: native build on the runner ---------------------------
  # Local Android builds still use docker/android.Dockerfile (one image that
  # works everywhere, incl. Windows hosts). CI builds natively instead so
  # Swatinem/rust-cache persists the Rust artifacts across runs — the Docker
  # build re-ran a cold 4-ABI cross-compile whenever any context file changed.
  # We ship two ABIs: aarch64 (real devices) + x86_64 (emulators).
  android:
    name: Android (native)
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: 27.0.12077973
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Rust toolchain (Android ABIs)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + platform + build-tools
        run: sdkmanager "ndk;${NDK_VERSION}" "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build APK (aarch64 + x86_64)
        run: |
          export NDK_HOME="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          echo "NDK_HOME=$NDK_HOME"
          pnpm android:init || true            # scaffold src-tauri/gen/android (gitignored)
          pnpm android:build --apk --debug --target aarch64 x86_64

      - name: Collect APKs
        shell: bash
        run: |
          mkdir -p staged
          find src-tauri/gen/android -name '*.apk' -exec cp -v {} staged/ \;
          ls -lah staged

      - uses: actions/upload-artifact@v7
        with:
          name: android
          path: staged/
          if-no-files-found: error

  # ---- Aggregate + publish GH Release --------------------------------
  release:
    name: Publish GitHub Release
    needs: [desktop, web, android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp -v {} release/ \;
          ls -lah release

      # Build latest.json from the desktop bundles + .sig sidecars. Refuses
      # noisily if no updater-eligible artifact has a matching .sig — the
      # canary for missing signing secrets.
      - name: Generate updater manifest (latest.json)
        run: |
          version="${GITHUB_REF_NAME#v}"
          node scripts/tasks/build-updater-manifest.mjs \
            --in  release \
            --out release/latest.json \
            --version "$version" \
            --repo "${{ github.repository }}"

      # Pull this version's section out of CHANGELOG.md so the Release page shows
      # the real notes for the tag, not an auto-generated placeholder.
      - name: Extract changelog for this release
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            seen && (index($0, "## ") == 1 || index($0, "[") == 1) { exit }
            index($0, "## [" ver "]") == 1 { seen = 1 }
            seen { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            printf "## %s\n\nSee [CHANGELOG.md](CHANGELOG.md) for details.\n" "$GITHUB_REF_NAME" > release-notes.md
          fi
          echo "----- release notes -----"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          body_path: release-notes.md
          draft: true # safer: review before publishing
          generate_release_notes: false
