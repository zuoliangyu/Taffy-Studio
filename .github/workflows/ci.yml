name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel older runs when new commits land on the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Frontend: typecheck + bundle build ----------------------------
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version:` — pnpm/action-setup reads packageManager from package.json
      # (pinned to pnpm@10.20.0), so CI and local stay identical.
      - uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc -b

      - name: Vite build
        run: pnpm build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

  # ---- Rust: fmt + clippy + check + test (whole workspace) -----------
  rust:
    name: Rust (workspace fmt + clippy + check + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri (src-tauri) needs webkit2gtk etc. even for `cargo check` because
      # generate_context! reads the bundle config + validates plugin manifests.
      # taffy-core / taffy-web don't, but a workspace build pulls in src-tauri.
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      # Both generate_context! (src-tauri) and rust-embed (taffy-web) need a
      # built `dist/`, so build the frontend before any cargo step.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo check (workspace)
        run: cargo check --workspace --all-targets

      # Data-layer coverage lives in taffy-core: migration chain (incl. adopting
      # an existing plugin-sql DB), CRUD, FTS sync, KV. Runs on every PR.
      - name: cargo test (workspace)
        run: cargo test --workspace -- --nocapture

  # ---- Web image: validate the self-hosted Docker build --------------
  web-docker:
    name: Web image (docker build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          load: true
          tags: taffy-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
